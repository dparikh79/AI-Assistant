<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Welcome! I am your Personal Assistant</h1>
    </header>
    <main>
        <section>
            <form action="/" method="post">
                <label for="question">Ask a Question:</label>
                <input type="text" id="question" name="question" required>
                <input type="submit" value="Ask">
            </form>
        </section>
        <div class="response-box">
            <h2>Response:</h2>
            <!-- Added div to store the response in a data attribute -->
            <div id="response-data" data-response="{{ response }}" style="display: none;"></div>
            <p id="response-text"></p>
        </div>
    </main>

    <footer>
        <p>Ideal Institute of Technology (IIT)</p>
        <p>Powered by ChatGPT</p>
    </footer>

    <script>
        // Retrieve the response from the data attribute
        let responseElement = document.getElementById("response-data");
        let responseText = responseElement.getAttribute("data-response");
        let displayElement = document.getElementById("response-text");
        let index = 0;
        let isBackspacing = false;  // Flag to indicate if we're currently backspacing to correct a typo

        function typeCharacter() {
            if (index < responseText.length) {
                // Introduce a typo with a small probability (e.g., 3%)
                if (!isBackspacing && Math.random() < 0.03) {
                    displayElement.textContent += getRandomChar();
                    isBackspacing = true;
                    setTimeout(typeCharacter, getHumanDelay(true));  // Pause slightly longer for a typo
                    return;
                }

                if (isBackspacing) {
                    // Remove the typo
                    displayElement.textContent = displayElement.textContent.slice(0, -1);
                    isBackspacing = false;
                    setTimeout(typeCharacter, getHumanDelay(true));  // Pause slightly longer after correcting a typo
                    return;
                }

                // Type the actual character
                displayElement.textContent += responseText[index];
                index++;

                setTimeout(typeCharacter, getHumanDelay());
            }
        }

        function getHumanDelay(isTypo = false) {
            let baseDelay = 10 + Math.random() * 20;  // Base typing speed

            // If it's a typo or punctuation, introduce a longer delay
            if (isTypo || [',', '.', '!', '?'].includes(responseText[index - 1])) {
                baseDelay += 40 + Math.random() * 40;
            }

            return baseDelay;
        }

        function getRandomChar() {
            const chars = "abcdefghijklmnopqrstuvwxyz";
            return chars[Math.floor(Math.random() * chars.length)];
        }

        // Start the typing effect
        typeCharacter();

    </script>

</body>
</html>
