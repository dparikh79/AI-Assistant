<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Welcome! I am your Personal Assistant</h1>
    </header>
    <main>
        <section>
            <form action="/" method="post">
                <label for="question">Ask a Question:</label>
                <input type="text" id="question" name="question" required>
                <input type="submit" value="Ask">
            </form>
        </section>
        <section>
            <form action="/upload" method="post" enctype="multipart/form-data" id="upload-form">
                <div id="file-inputs">
                    <div class="file-input-wrapper">
                        <label>Upload a PDF:</label>
                        <input type="file" name="pdf[]" accept=".pdf" required>
                        <span class="remove-input" onclick="removeInput(this)">✖</span>
                    </div>                    
                </div>
                <button type="button" id="add-file">Add Another File</button>
                <input type="submit" value="Upload">
            </form>
        </section>        
        <div class="response-box">
            <h2>Response:</h2>
            <div id="response-data" data-response="{{ response }}" style="display: none;"></div>
            <p id="response-text"></p>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
    </main>

    <footer>
        <p>Ideal Institute of Technology (IIT)</p>
        <p>Powered by ChatGPT</p>
    </footer>

    <script>
        let responseElement = document.getElementById("response-data");
        let responseText = responseElement.getAttribute("data-response");
        let displayElement = document.getElementById("response-text");
        let index = 0;
        let isBackspacing = false;

        function typeCharacter() {
            if (index < responseText.length) {
                if (!isBackspacing && Math.random() < 0.03) {
                    displayElement.textContent += getRandomChar();
                    isBackspacing = true;
                    setTimeout(typeCharacter, getHumanDelay(true));
                    return;
                }

                if (isBackspacing) {
                    displayElement.textContent = displayElement.textContent.slice(0, -1);
                    isBackspacing = false;
                    setTimeout(typeCharacter, getHumanDelay(true));
                    return;
                }

                displayElement.textContent += responseText[index];
                index++;
                setTimeout(typeCharacter, getHumanDelay());
            }
        }

        function getHumanDelay(isTypo = false) {
            let baseDelay = 10 + Math.random() * 20;
            if (isTypo || [',', '.', '!', '?'].includes(responseText[index - 1])) {
                baseDelay += 40 + Math.random() * 40;
            }
            return baseDelay;
        }

        function getRandomChar() {
            const chars = "abcdefghijklmnopqrstuvwxyz";
            return chars[Math.floor(Math.random() * chars.length)];
        }

        typeCharacter();

        // Script to add another file input
        document.getElementById('add-file').addEventListener('click', function() {
            const fileInputs = document.getElementById('file-inputs');
            const wrapper = document.createElement('div');
            wrapper.className = 'file-input-wrapper';
            
            const newInput = document.createElement('input');
            newInput.type = 'file';
            newInput.name = 'pdf[]';
            newInput.accept = '.pdf';
            newInput.required = true;
            
            const removeSpan = document.createElement('span');
            removeSpan.className = 'remove-input';
            removeSpan.textContent = '✖';
            removeSpan.onclick = function() { removeInput(this); };
            
            wrapper.appendChild(newInput);
            wrapper.appendChild(removeSpan);
            fileInputs.appendChild(wrapper);
        });

        function removeInput(element) {
            element.parentElement.remove();
        }

        document.getElementById('upload-form').addEventListener('submit', function(e) {
            const fileInputs = document.querySelectorAll('input[type="file"]');
            for (let input of fileInputs) {
                if (!input.files.length) {
                    alert('Please select a file for all inputs or remove unused ones.');
                    e.preventDefault();
                    return;
                }
            }
        });

    </script>

</body>
</html>
