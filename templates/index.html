<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Welcome! I am your Personal Assistant</h1>
    </header>
    <main>
        <section>
            <form action="/" method="post">
                <label for="question">Ask a Question:</label>
                <input type="text" id="question" name="question" required>
                <input type="submit" value="Ask">
            </form>
        </section>
        <section>
            <form action="/upload" method="post" enctype="multipart/form-data">
                <label for="pdf">Upload a PDF:</label>
                <input type="file" id="pdf" name="pdf" accept=".pdf" required>
                <input type="submit" value="Upload">
            </form>
        </section>
        <div class="response-box">
            <h2>Response:</h2>
            <div id="response-data" data-response="{{ response }}" style="display: none;"></div>
            <p id="response-text"></p>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
    </main>

    <div class="container">
        <div class="chatbox">
            <div class="chatbox__support">
                <div class="chatbox__header">
                    <div class="chatbox__image--header">
                        <img src="https://img.icons8.com/color/48/000000/circled-user-female-skin-type-5--v1.png" alt="image">
                    </div>
                    <div class="chatbox__content--header">
                        <h4 class="chatbox__heading--header">Ren</h4>
                        <!-- <p class="chatbox__description--header">Hi. I am Ren. How can I help you?</p> -->
                    </div>
                </div>
                <div class="chatbox__messages">
                    <div></div>
                </div>
                <div class="chatbox__footer">
                    <input type="text" placeholder="Write a message...">
                    <button class="chatbox__send--footer send__button">Send</button>
                </div>
            </div>
            <div class="chatbox__button">
                <button><img src="{{ url_for('static', filename='images/chatbox.png') }}" /></button>
            </div>
        </div>
    </div>

    <footer>
        <p>Ideal Institute of Technology (IIT)</p>
        <p>Powered by ChatGPT</p>
    </footer>

    <script>
        $SCRIPT_ROOT = JSON.parse('{{ request.script_root|tojson|safe }}');
    </script>
    <script type="text/javascript" src="{{ url_for('static', filename='app.js') }}"></script>

    <script>
        let responseElement = document.getElementById("response-data");
        let responseText = responseElement.getAttribute("data-response");
        let displayElement = document.getElementById("response-text");
        let index = 0;
        let isBackspacing = false;

        function typeCharacter() {
            if (index < responseText.length) {
                if (!isBackspacing && Math.random() < 0.03) {
                    displayElement.textContent += getRandomChar();
                    isBackspacing = true;
                    setTimeout(typeCharacter, getHumanDelay(true));
                    return;
                }

                if (isBackspacing) {
                    displayElement.textContent = displayElement.textContent.slice(0, -1);
                    isBackspacing = false;
                    setTimeout(typeCharacter, getHumanDelay(true));
                    return;
                }

                displayElement.textContent += responseText[index];
                index++;
                setTimeout(typeCharacter, getHumanDelay());
            }
        }

        function getHumanDelay(isTypo = false) {
            let baseDelay = 10 + Math.random() * 20;
            if (isTypo || [',', '.', '!', '?'].includes(responseText[index - 1])) {
                baseDelay += 40 + Math.random() * 40;
            }
            return baseDelay;
        }

        function getRandomChar() {
            const chars = "abcdefghijklmnopqrstuvwxyz";
            return chars[Math.floor(Math.random() * chars.length)];
        }

        typeCharacter();
    </script>
</body>
</html>
